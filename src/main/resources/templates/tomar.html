<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${empresa.nombre} + ' · Tomar turno'">Tomar turno</title>
    <link rel="stylesheet" href="/css/style.css">
    <style th:inline="text">
        :root {
            --color-primario: [[${empresa.colorPrimario}]];
            --color-secundario: [[${empresa.colorSecundario}]];
        }
    </style>
    <style>
        .teclado {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }
        .fila-teclado {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tecla {
            min-width: 40px;
            padding: 12px 0;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: #e2e8f0;
            color: var(--color-secundario);
            cursor: pointer;
        }
        .tecla:active { background: var(--color-primario); color: #fff; }
        .tecla.ancha { min-width: 140px; }
    </style>
</head>
<body>
    <div class="encabezado">
        <img th:if="${empresa.logoUrl}" th:src="${empresa.logoUrl}" alt="logo">
        <h1 th:text="${empresa.nombre}">Nombre de la empresa</h1>
    </div>

    <div class="contenedor">
        <div class="tarjeta">
            <p th:text="${empresa.mensajeBienvenida}">Bienvenido</p>

            <div id="paso-nombre" style="text-align:left;">
                <label for="nombre">Nombre y apellido</label>
                <input type="text" id="nombre" placeholder="Nombre completo" readonly>

                <div class="teclado" id="teclado">
                    <div class="fila-teclado">
                        <button type="button" class="tecla" data-letra="Q">Q</button>
                        <button type="button" class="tecla" data-letra="W">W</button>
                        <button type="button" class="tecla" data-letra="E">E</button>
                        <button type="button" class="tecla" data-letra="R">R</button>
                        <button type="button" class="tecla" data-letra="T">T</button>
                        <button type="button" class="tecla" data-letra="Y">Y</button>
                        <button type="button" class="tecla" data-letra="U">U</button>
                        <button type="button" class="tecla" data-letra="I">I</button>
                        <button type="button" class="tecla" data-letra="O">O</button>
                        <button type="button" class="tecla" data-letra="P">P</button>
                    </div>
                    <div class="fila-teclado">
                        <button type="button" class="tecla" data-letra="A">A</button>
                        <button type="button" class="tecla" data-letra="S">S</button>
                        <button type="button" class="tecla" data-letra="D">D</button>
                        <button type="button" class="tecla" data-letra="F">F</button>
                        <button type="button" class="tecla" data-letra="G">G</button>
                        <button type="button" class="tecla" data-letra="H">H</button>
                        <button type="button" class="tecla" data-letra="J">J</button>
                        <button type="button" class="tecla" data-letra="K">K</button>
                        <button type="button" class="tecla" data-letra="L">L</button>
                        <button type="button" class="tecla" data-letra="Ñ">Ñ</button>
                    </div>
                    <div class="fila-teclado">
                        <button type="button" class="tecla" data-letra="Z">Z</button>
                        <button type="button" class="tecla" data-letra="X">X</button>
                        <button type="button" class="tecla" data-letra="C">C</button>
                        <button type="button" class="tecla" data-letra="V">V</button>
                        <button type="button" class="tecla" data-letra="B">B</button>
                        <button type="button" class="tecla" data-letra="N">N</button>
                        <button type="button" class="tecla" data-letra="M">M</button>
                    </div>
                    <div class="fila-teclado">
                        <button type="button" class="tecla ancha" id="tecla-espacio">Espacio</button>
                        <button type="button" class="tecla ancha" id="tecla-borrar">⌫ Borrar</button>
                    </div>
                </div>

                <button class="boton" id="btn-tomar" style="margin-top:16px;">Tomar turno</button>
            </div>

            <div class="ticket-tomado" id="ticket-tomado">
                <div class="etiqueta">Tu número es</div>
                <div class="numero-actual" id="numero-obtenido">--</div>
                <div class="info-espera" id="posicion-obtenida"></div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const slug = /*[[${empresa.slug}]]*/ 'demo';
        const inputNombre = document.getElementById('nombre');

        document.querySelectorAll('.tecla[data-letra]').forEach(tecla => {
            tecla.addEventListener('click', () => {
                inputNombre.value += tecla.getAttribute('data-letra');
            });
        });

        document.getElementById('tecla-espacio').addEventListener('click', () => {
            inputNombre.value += ' ';
        });

        document.getElementById('tecla-borrar').addEventListener('click', () => {
            inputNombre.value = inputNombre.value.slice(0, -1);
        });

        document.getElementById('btn-tomar').addEventListener('click', () => {
            const nombre = inputNombre.value.trim();
            if (!nombre) { alert('Ingresá tu nombre para continuar.'); return; }

            const boton = document.getElementById('btn-tomar');
            boton.disabled = true;

            fetch('/api/' + slug + '/turnos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre: nombre })
            })
                .then(r => r.json())
                .then(datos => {
                    document.getElementById('numero-obtenido').textContent = datos.etiqueta;
                    document.getElementById('posicion-obtenida').textContent =
                        'Personas delante tuyo: ' + Math.max(0, datos.enEspera - 1);
                    document.getElementById('ticket-tomado').classList.add('visible');
                    document.getElementById('paso-nombre').style.display = 'none';

                    // Vuelve a /{slug}/tomar para que el próximo cliente pueda cargar su nombre
                    setTimeout(() => {
                        window.location.href = '/' + slug + '/tomar';
                    }, 5000);
                })
                .catch(() => {
                    alert('No se pudo tomar el turno. Intentá nuevamente.');
                    boton.disabled = false;
                });
        });
    </script>
</body>
</html>
