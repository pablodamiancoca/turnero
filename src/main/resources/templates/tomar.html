<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${empresa.nombre} + ' · Tomar turno'">Tomar turno</title>
    <link rel="stylesheet" href="/css/style.css">
    <style th:inline="text">
        :root {
            --color-primario: [[${empresa.colorPrimario}]];
            --color-secundario: [[${empresa.colorSecundario}]];
        }
    </style>
</head>
<body>
    <div class="encabezado">
        <img th:if="${empresa.logoUrl}" th:src="${empresa.logoUrl}" alt="logo">
        <h1 th:text="${empresa.nombre}">Nombre de la empresa</h1>
    </div>

    <div class="contenedor">
        <div class="tarjeta">
            <p th:text="${empresa.mensajeBienvenida}">Bienvenido</p>

            <div id="paso-dni">
                <label for="dni" style="text-align:left;">Ingresá tu DNI</label>
                <input type="text" id="dni" inputmode="numeric" placeholder="Ej: 30123456" maxlength="10">
                <button class="boton" id="btn-buscar">Buscar</button>
            </div>

            <div id="paso-nombre" style="display:none; text-align:left;">
                <p id="mensaje-nombre"></p>
                <label for="nombre">Nombre y apellido</label>
                <input type="text" id="nombre" placeholder="Nombre completo">
                <button class="boton" id="btn-tomar">Confirmar y tomar turno</button>
                <button class="boton secundario" id="btn-cambiar-dni" type="button">Cambiar DNI</button>
            </div>

            <div class="ticket-tomado" id="ticket-tomado">
                <div class="etiqueta">Tu número es</div>
                <div class="numero-actual" id="numero-obtenido">--</div>
                <div class="info-espera" id="posicion-obtenida"></div>
            </div>
        </div>
        <div class="pie">
            <a th:href="${'/' + empresa.slug}" style="color:inherit;">Ver pantalla de turnos</a>
        </div>
    </div>

    <script th:inline="javascript">
        const slug = /*[[${empresa.slug}]]*/ 'demo';
        let dniActual = '';

        document.getElementById('btn-buscar').addEventListener('click', () => {
            const dni = document.getElementById('dni').value.trim();
            if (!dni) { return; }
            dniActual = dni;

            fetch('/api/' + slug + '/dni/' + encodeURIComponent(dni))
                .then(r => r.json())
                .then(datos => {
                    const mensaje = document.getElementById('mensaje-nombre');
                    const inputNombre = document.getElementById('nombre');
                    if (datos.encontrado) {
                        inputNombre.value = datos.nombre;
                        mensaje.textContent = '¿Es correcto este nombre? Si no, corregilo antes de continuar.';
                    } else {
                        inputNombre.value = '';
                        mensaje.textContent = 'No encontramos ese DNI. Ingresá tu nombre completo.';
                    }
                    document.getElementById('paso-dni').style.display = 'none';
                    document.getElementById('paso-nombre').style.display = 'block';
                })
                .catch(() => alert('No se pudo verificar el DNI. Intentá nuevamente.'));
        });

        document.getElementById('btn-cambiar-dni').addEventListener('click', () => {
            document.getElementById('paso-nombre').style.display = 'none';
            document.getElementById('paso-dni').style.display = 'block';
        });

        document.getElementById('btn-tomar').addEventListener('click', () => {
            const nombre = document.getElementById('nombre').value.trim();
            if (!nombre) { alert('Ingresá tu nombre para continuar.'); return; }

            const boton = document.getElementById('btn-tomar');
            boton.disabled = true;

            fetch('/api/' + slug + '/turnos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dni: dniActual, nombre: nombre })
            })
                .then(r => r.json())
                .then(datos => {
                    document.getElementById('numero-obtenido').textContent = datos.etiqueta;
                    document.getElementById('posicion-obtenida').textContent =
                        'Personas delante tuyo: ' + Math.max(0, datos.enEspera - 1);
                    document.getElementById('ticket-tomado').classList.add('visible');
                    document.getElementById('paso-nombre').style.display = 'none';
                })
                .catch(() => {
                    alert('No se pudo tomar el turno. Intentá nuevamente.');
                    boton.disabled = false;
                });
        });
    </script>
</body>
</html>
