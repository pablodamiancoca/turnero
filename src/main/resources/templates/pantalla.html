<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${empresa.nombre} + ' · Turnos'">Turnos</title>
    <link rel="stylesheet" href="/css/style.css">
    <style th:inline="text">
        :root {
            --color-primario: [[${empresa.colorPrimario}]];
            --color-secundario: [[${empresa.colorSecundario}]];
        }
    </style>
</head>
<body>
    <div class="encabezado">
        <img th:if="${empresa.logoUrl}" th:src="${empresa.logoUrl}" alt="logo">
        <h1 th:text="${empresa.nombre}">Nombre de la empresa</h1>
    </div>

    <div class="contenedor">
        <div class="tarjeta">
            <div class="etiqueta">Atendiendo ahora</div>
            <div class="numero-actual" id="numero-actual">--</div>
            <div class="info-espera" id="info-nombre"></div>
            <div class="info-espera" id="info-dni"></div>
            <div class="info-espera" id="info-ventanilla"></div>
            <div class="info-espera" id="info-espera">Personas en espera: --</div>
        </div>
        <div class="tarjeta">
            <div class="etiqueta">Personas en espera</div>
            <ul class="lista-empresas" id="lista-espera" style="text-align:left; margin-top:16px;">
                <li>Cargando...</li>
            </ul>
        </div>

        <div class="pie">
            Para tomar un número, ingresá a
            <strong th:text="${'/' + empresa.slug + '/tomar'}">/empresa/tomar</strong>
        </div>
    </div>

    <script th:inline="javascript">
        const slug = /*[[${empresa.slug}]]*/ 'demo';
        const idioma = /*[[${empresa.idioma}]]*/ 'es-AR';
        let ultimoIdAnunciado = null;
        let yaCargoInicial = false;

        function pintar(datos) {
            document.getElementById('numero-actual').textContent = datos.etiqueta;
            document.getElementById('info-espera').textContent = 'Personas en espera: ' + datos.enEspera;
            document.getElementById('info-ventanilla').textContent = datos.ventanilla ? ('Ventanilla: ' + datos.ventanilla) : '';
            document.getElementById('info-nombre').textContent = datos.nombreCliente ? datos.nombreCliente : '';
            document.getElementById('info-dni').textContent = datos.dni ? ('DNI: ' + datos.dni) : '';

            if (!yaCargoInicial) {
                // al cargar la página no anunciamos el turno que ya estaba en pantalla,
                // solo los que se llamen de ahí en adelante
                yaCargoInicial = true;
                ultimoIdAnunciado = datos.id;
                return;
            }

            if (datos.estado === 'LLAMANDO' && datos.id !== ultimoIdAnunciado) {
                ultimoIdAnunciado = datos.id;
                anunciarLlamado(datos);
            }
        }

        function pintarEspera(lista) {
            const contenedor = document.getElementById('lista-espera');
            contenedor.innerHTML = '';
            if (!lista || lista.length === 0) {
                contenedor.innerHTML = '<li>No hay nadie esperando</li>';
                return;
            }
            lista.forEach(turno => {
                const li = document.createElement('li');
                li.textContent = turno.etiqueta + (turno.nombreCliente ? ' — ' + turno.nombreCliente : '');
                contenedor.appendChild(li);
            });
        }

        function actualizarListaEspera() {
            fetch('/api/' + slug + '/espera').then(r => r.json()).then(pintarEspera).catch(() => {});
        }

        function anunciarLlamado(datos) {
            if (!('speechSynthesis' in window)) { return; }

            const numeroHablado = datos.etiqueta.replace('-', ' ');
            const texto = datos.nombreCliente
                ? 'Turno ' + numeroHablado + '. ' + datos.nombreCliente
                : 'Turno ' + numeroHablado;

            const anuncio = new SpeechSynthesisUtterance(texto);
            anuncio.lang = idioma || 'es-AR'; // Español por defecto si la empresa no tiene idioma configurado
            window.speechSynthesis.cancel(); // corta cualquier anuncio anterior que siga sonando
            window.speechSynthesis.speak(anuncio);
        }

        // Estado inicial al cargar la página
        fetch('/api/' + slug + '/actual').then(r => r.json()).then(pintar).catch(() => {});
        actualizarListaEspera();

        // Actualización en tiempo real vía Server-Sent Events
        const fuente = new EventSource('/api/' + slug + '/stream');
        fuente.addEventListener('turno-actualizado', (evento) => {
            pintar(JSON.parse(evento.data));
            actualizarListaEspera();
        });
        fuente.onerror = () => {
            // si se corta la conexión, hacemos polling de respaldo cada 5s
            setInterval(() => {
                fetch('/api/' + slug + '/actual').then(r => r.json()).then(pintar).catch(() => {});
                actualizarListaEspera();
            }, 5000);
        };
    </script>
</body>
</html>
