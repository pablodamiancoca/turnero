spring.application.name=turnero-app

# Puerto: Render/Railway inyectan la variable PORT automaticamente
server.port=${PORT:8080}

# Base de datos H2 embebida, persistida en un archivo (no se pierde al reiniciar)
# Para producción real con muchos datos, cambiar por PostgreSQL (ver README).
spring.datasource.url=jdbc:h2:file:./data/turnero;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Consola H2 disponible en /h2-console (util para depurar; deshabilitar en producción si se desea)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false
